<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instant Selection Translator - Settings</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        margin: 24px;
        color: #1f1f1f;
      }
      .container {
        max-width: 640px;
      }
      h1 {
        margin-top: 0;
        font-size: 22px;
      }
      p {
        color: #4f4f4f;
      }
      label {
        display: block;
        margin-top: 14px;
        font-weight: 600;
      }
      input,
      select {
        margin-top: 6px;
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d5d5d5;
        border-radius: 8px;
        font-size: 14px;
      }
      .row {
        margin-top: 14px;
      }
      .inline {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      button {
        margin-top: 18px;
        border: 0;
        border-radius: 8px;
        background: #1f6feb;
        color: white;
        padding: 9px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      .status {
        margin-top: 10px;
        font-size: 13px;
        color: #1f6feb;
      }
      .hint {
        font-size: 12px;
        color: #696969;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Instant Selection Translator</h1>
      <p>Configure DeepL API key and target language for instant translation.</p>

      <label for="apiKey">DeepL API key</label>
      <input id="apiKey" type="password" placeholder="Enter DeepL API key" />
      <div class="hint">For DeepL Free plan use the key from your account dashboard.</div>

      <label for="targetLang">Target language</label>
      <select id="targetLang">
        <option value="RU">Russian (RU)</option>
        <option value="EN">English (EN)</option>
        <option value="DE">German (DE)</option>
        <option value="FR">French (FR)</option>
        <option value="ES">Spanish (ES)</option>
        <option value="IT">Italian (IT)</option>
        <option value="PT-BR">Portuguese, Brazil (PT-BR)</option>
        <option value="JA">Japanese (JA)</option>
        <option value="ZH">Chinese (ZH)</option>
      </select>

      <div class="row inline">
        <input id="enabled" type="checkbox" />
        <label for="enabled" style="margin: 0; font-weight: 500">Enable instant auto-translation</label>
      </div>

      <label for="notionToken">Notion integration token</label>
      <input id="notionToken" type="password" placeholder="Enter Notion internal integration token" />
      <div class="hint">Create it at notion.so/my-integrations and keep it private.</div>

      <label for="notionDatabaseId">Notion database ID</label>
      <input id="notionDatabaseId" type="text" placeholder="Paste target database ID" />
      <div class="hint">Share the database with your integration before saving.</div>

      <div class="row inline">
        <input id="notionEnabled" type="checkbox" />
        <label for="notionEnabled" style="margin: 0; font-weight: 500"
          >Enable save to Notion by hotkey (Cmd/Ctrl+Shift+Q)</label
        >
      </div>

      <button id="saveBtn" type="button">Save settings</button>
      <div class="status" id="status"></div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
