name: Bug report
description: Report a reproducible problem
title: "fix(extension): "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in all required details.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A clear and short bug description.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps so we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Select text ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: e.g. Chrome 124
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15.3 / Windows 11
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console logs or screenshots
      description: Paste logs/screenshots if available.
      render: shell
