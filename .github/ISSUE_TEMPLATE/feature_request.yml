name: Feature request
description: Suggest an improvement or new feature
title: "feat(extension): "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. Please describe the problem and solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
      placeholder: It is hard to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added or changed?
      placeholder: Add a setting to ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know the feature is complete?
      placeholder: |
        - [ ] User can ...
        - [ ] Setting is persisted ...
    validations:
      required: true
